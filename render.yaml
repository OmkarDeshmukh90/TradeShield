services:
  - type: web
    name: tradeshield-web
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: APP_ENV
        value: prod
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: ENABLE_DOCS
        value: "false"
      - key: DEMO_MODE
        value: "true"
      - key: DEMO_SCENARIO
        value: all
      - key: DATABASE_URL
        fromDatabase:
          name: tradeshield-db
          property: connectionString
      - key: AUTH_SECRET
        value: CHANGE_ME_SHARED_SECRET

  - type: worker
    name: tradeshield-worker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.worker
    envVars:
      - key: APP_ENV
        value: prod
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: ENABLE_DOCS
        value: "false"
      - key: DEMO_MODE
        value: "true"
      - key: DEMO_SCENARIO
        value: all
      - key: DATABASE_URL
        fromDatabase:
          name: tradeshield-db
          property: connectionString
      - key: AUTH_SECRET
        value: CHANGE_ME_SHARED_SECRET

databases:
  - name: tradeshield-db
    plan: starter
