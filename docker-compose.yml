version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tradeshield
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      APP_ENV: prod
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/tradeshield
      AUTO_CREATE_SCHEMA: "false"
      ENABLE_DOCS: "false"
      AUTH_SECRET: replace-me
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  worker:
    build: .
    command: python -m app.worker
    environment:
      APP_ENV: prod
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/tradeshield
      AUTO_CREATE_SCHEMA: "false"
      ENABLE_DOCS: "false"
      AUTH_SECRET: replace-me
    depends_on:
      - postgres

volumes:
  postgres_data:
