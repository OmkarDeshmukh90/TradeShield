services:
  - type: web
    name: tradeshield-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: APP_ENV
        value: prod
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: ENABLE_DOCS
        value: "false"
      - key: DEMO_MODE
        value: "true"
      - key: DEMO_SCENARIO
        value: all
      - key: DATABASE_URL
        fromDatabase:
          name: tradeshield-db
          property: connectionString
      - key: AUTH_SECRET
        value: CHANGE_ME_SHARED_SECRET
      - key: CORS_ORIGINS
        value: https://your-frontend-domain.pages.dev

databases:
  - name: tradeshield-db
    plan: free
